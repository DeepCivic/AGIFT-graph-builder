services:
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/changeme
      NEO4J_PLUGINS: '[]'
    volumes:
      - neo4j_data:/data

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    ports:
      - "5050:5050"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: changeme
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - neo4j

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: agift-worker
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: changeme
    volumes:
      - model_cache:/app/models
    depends_on:
      - neo4j

volumes:
  neo4j_data:
  model_cache:
