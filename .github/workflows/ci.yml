name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install ".[dev,cogdb]"

      - name: Check formatting (black)
        run: black --check agift/ tests/ dashboard/ import_agift.py

      - name: Lint (flake8)
        run: flake8 agift/ tests/ dashboard/ import_agift.py

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install ".[dev,cogdb]"

      - name: Run tests
        run: pytest --ignore=tests/test_docker.py

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install test dependencies
        run: pip install ".[dev,cogdb]"

      - name: Run Docker tests
        run: pytest tests/test_docker.py -v --timeout=600
